services:
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main

    ports:
      - "3999:8080"

    volumes:
      - /media/hunter/12TB_Youtube/Docker-applications/open-webui/data:/app/backend/data

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      WEBUI_SECRET_KEY: ""

      # Optional but useful
      ENABLE_SIGNUP: "true"

    restart: unless-stopped
