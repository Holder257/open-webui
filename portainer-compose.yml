services:
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:cuda

    ports:
      - "8080:8080"

    volumes:
      - open-webui/data:/app/backend/data

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      WEBUI_SECRET_KEY: ""
      ENABLE_SIGNUP: "true"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      
      ENABLE_WEB_SEARCH: "true"
      WEB_SEARCH_ENGINE: "brave"
      WEB_SEARCH_RESULT_COUNT: "10"

      # Important: use qwen3:8b to generate search queries
      TASK_MODEL: "qwen3:8b"

      # Use your existing ComfyUI container through host port 3071
      ENABLE_IMAGE_GENERATION: "true"
      COMFYUI_BASE_URL: "http://host.docker.internal:3071/"

            # Jupyter-backed code execution/interpreter
      ENABLE_CODE_EXECUTION: "true"
      CODE_EXECUTION_ENGINE: "jupyter"
      CODE_EXECUTION_JUPYTER_URL: "http://jupyter:8888"
      CODE_EXECUTION_JUPYTER_AUTH: "token"
      CODE_EXECUTION_JUPYTER_AUTH_TOKEN: "openwebui-code-token"
      CODE_EXECUTION_JUPYTER_TIMEOUT: "120"

      ENABLE_CODE_INTERPRETER: "true"
      CODE_INTERPRETER_ENGINE: "jupyter"
      CODE_INTERPRETER_JUPYTER_URL: "http://jupyter:8888"
      CODE_INTERPRETER_JUPYTER_AUTH: "token"
      CODE_INTERPRETER_JUPYTER_AUTH_TOKEN: "openwebui-code-token"
      CODE_INTERPRETER_JUPYTER_TIMEOUT: "120"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    depends_on:
      - jupyter

    restart: unless-stopped

    

  jupyter:
    container_name: open-webui-jupyter
    image: quay.io/jupyter/scipy-notebook:latest

    ports:
      - "8888:8888"

    volumes:
      - open-webui/jupyter:/home/jovyan/work

    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "openwebui-code-token"

    command: >
      start-notebook.py
      --ServerApp.token=openwebui-code-token
      --ServerApp.password=''
      --ServerApp.allow_origin='*'
      --ServerApp.ip=0.0.0.0
      --ServerApp.port=8888
      --ServerApp.allow_remote_access=True

    restart: unless-stopped


  code-server:
    container_name: open-webui-vscode
    image: lscr.io/linuxserver/code-server:latest

    ports:
      - "8443:8443"

    volumes:
      - open-webui/code-server:/config
      - open-webui/jupyter:/workspace

    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "America/Los_Angeles"
      PASSWORD: "Change_Password"
      DEFAULT_WORKSPACE: "/workspace"

    restart: unless-stopped
