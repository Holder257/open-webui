services:
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main

    ports:
      - "3999:8080"

    volumes:
      - /media/hunter/12TB_Youtube/Docker-applications/open-webui/data:/app/backend/data

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      WEBUI_SECRET_KEY: "a938a6df980b6937fb8602d02fe35f8d88802f4afead0a54a370bec1691ceece"
      ENABLE_SIGNUP: "true"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    restart: unless-stopped
