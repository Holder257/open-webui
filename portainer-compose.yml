services:
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:cuda

    ports:
      - "3999:8080"

    volumes:
      - /media/hunter/12TB_Youtube/Docker-applications/open-webui/data:/app/backend/data

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      WEBUI_SECRET_KEY: "a938a6df980b6937fb8602d02fe35f8d88802f4afead0a54a370bec1691ceece"
      ENABLE_SIGNUP: "true"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      
      ENABLE_WEB_SEARCH: "true"
      WEB_SEARCH_ENGINE: "duckduckgo"
      WEB_SEARCH_RESULT_COUNT: "5"

      # Important: use qwen3:8b to generate search queries
      TASK_MODEL: "qwen3:8b"

      # Use your existing ComfyUI container through host port 3071
      ENABLE_IMAGE_GENERATION: "true"
      COMFYUI_BASE_URL: "http://host.docker.internal:3071/"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    restart: unless-stopped
